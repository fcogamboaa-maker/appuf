<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UF Pro - Fco Gamboa</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ef4444">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #fee2e2; }
        .app-card { max-width: 450px; margin: 1.5rem auto; border-radius: 2rem; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .copy-toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 10px; position: fixed; z-index: 1; left: 50%; bottom: 30px; transform: translateX(-50%); }
        .copy-toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4">
    <div class="app-card bg-white shadow-2xl overflow-hidden border border-red-100">
        <div class="bg-red-500 p-8 text-white text-center">
            <h1 class="text-2xl font-black uppercase tracking-tighter">Calculadora UF</h1>
            <p id="rateInfo" class="text-red-100 text-sm mt-2 font-medium">Buscando valor UF...</p>
            <p id="sourceInfo" class="text-[10px] text-red-200 uppercase mt-1 tracking-widest font-bold"></p>
        </div>

        <div class="p-6">
            <button onclick="cambiarModo()" class="w-full flex items-center justify-center gap-2 py-3 mb-6 bg-red-50 text-red-600 rounded-2xl font-bold border border-red-100 hover:bg-red-100 transition active:scale-95">
                <span id="modeText">Modo: Pesos a UF</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 font-bold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                </svg>
            </button>

            <div class="mb-6">
                <label class="block text-xs font-bold text-red-400 uppercase mb-1 ml-1 text-center italic">Monto a ingresar</label>
                <input type="number" id="amount" 
                       class="w-full p-4 bg-gray-50 border-2 border-red-50 rounded-2xl text-2xl font-black focus:border-red-400 focus:outline-none transition text-center text-gray-700" 
                       placeholder="0" oninput="convertir()">
            </div>

            <div class="grid grid-cols-4 gap-2">
                <button onclick="convertir()" class="col-span-3 py-4 bg-red-600 text-white rounded-2xl font-bold text-lg shadow-lg hover:bg-red-700 active:scale-95 transition-all">
                    Calcular
                </button>
                <button onclick="limpiar()" class="col-span-1 py-4 bg-gray-100 text-gray-400 rounded-2xl flex items-center justify-center hover:bg-gray-200 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </div>

            <div class="mt-8 p-6 bg-red-50 rounded-3xl border-2 border-dashed border-red-200 text-center relative group">
                <p class="text-xs font-bold text-red-400 uppercase mb-2">Resultado Estimado</p>
                <p id="result" class="text-3xl font-black text-red-600 mb-4">$ 0</p>
                
                <button onclick="copiarResultado()" class="mx-auto flex items-center gap-2 px-4 py-2 bg-white text-red-500 rounded-full text-xs font-bold shadow-sm border border-red-100 hover:bg-red-500 hover:text-white transition-all active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                    </svg>
                    COPIAR RESULTADO
                </button>
            </div>
        </div>
        
        <div class="p-6 bg-gray-50 text-center border-t border-red-50">
            <p class="text-sm font-bold text-gray-400 italic">Desarrollado por</p>
            <p class="text-xl font-black text-red-500 tracking-tight uppercase">Fco Gamboa</p>
        </div>
    </div>

    <div id="toast" class="copy-toast italic font-bold">¡Copiado al portapapeles! 📋</div>

    <script>
        let isPesoToUF = true;
        let valorUF = 0;

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        async function getTasa() {
            const fuentes = [
                { nombre: "Mindicador", url: "https://mindicador.cl/api/uf", parse: (d) => d.serie[0].valor },
                { nombre: "Gael API", url: "https://api.gael.cl/general/public/indicadores/uf", parse: (d) => parseFloat(d.valor.replace('.', '').replace(',', '.')) },
                { nombre: "Criptoya Chile", url: "https://criptoya.com/api/dolar/clp", parse: (d) => 0 } // Solo ejemplo, se detiene si no hay UF
            ];

            for (let fuente of fuentes) {
                try {
                    const response = await fetch(fuente.url);
                    const data = await response.json();
                    const valorExtraido = fuente.parse(data);
                    
                    if (valorExtraido > 0) {
                        valorUF = valorExtraido;
                        document.getElementById('rateInfo').innerText = `Valor UF: $${valorUF.toLocaleString('es-CL')} CLP`;
                        document.getElementById('sourceInfo').innerText = `Vía: ${fuente.nombre}`;
                        return;
                    }
                } catch (e) { console.warn(`Falla: ${fuente.nombre}`); }
            }
            document.getElementById('rateInfo').innerText = "Sin conexión a indicadores";
        }

        function cambiarModo() {
            isPesoToUF = !isPesoToUF;
            document.getElementById('modeText').innerText = isPesoToUF ? "Modo: Pesos a UF" : "Modo: UF a Pesos";
            limpiar();
        }

        function limpiar() {
            document.getElementById('amount').value = "";
            document.getElementById('result').innerText = "$ 0";
            document.getElementById('amount').focus();
        }

        function convertir() {
            const val = parseFloat(document.getElementById('amount').value);
            if (isNaN(val) || valorUF === 0) return;
            const res = isPesoToUF ? (val / valorUF) : (val * valorUF);
            
            if (isPesoToUF) {
                document.getElementById('result').innerText = res.toLocaleString('es-CL', {minimumFractionDigits: 2, maximumFractionDigits: 4}) + " UF";
            } else {
                document.getElementById('result').innerText = res.toLocaleString('es-CL', {style: 'currency', currency: 'CLP', minimumFractionDigits: 0});
            }
        }

        function copiarResultado() {
            const texto = document.getElementById('result').innerText;
            if (texto === "$ 0") return;

            navigator.clipboard.writeText(texto).then(() => {
                const toast = document.getElementById("toast");
                toast.className = "copy-toast show italic font-bold";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
            });
        }
        
        getTasa();
    </script>
</body>
</html>
