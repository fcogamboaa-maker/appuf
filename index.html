<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor UF Pro - Fco Gamboa</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f87171">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fondo Rojo Claro / Rosa Suave */
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #fee2e2; }
        .app-container { max-width: 450px; margin: 2rem auto; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4">
    <div class="app-container bg-white rounded-3xl shadow-2xl overflow-hidden border border-red-100">
        <div class="bg-red-500 p-8 text-white text-center">
            <h1 class="text-2xl font-black uppercase tracking-tighter">Calculadora UF</h1>
            <p id="rateInfo" class="text-red-100 text-sm mt-2 font-medium">Consultando valor UF...</p>
        </div>

        <div class="p-6">
            <button id="toggleBtn" onclick="cambiarModo()" class="w-full flex items-center justify-center gap-2 py-3 mb-6 bg-red-50 text-red-600 rounded-2xl font-bold border border-red-100 hover:bg-red-100 transition active:scale-95">
                <span id="modeText">Modo: Pesos a UF</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                </svg>
            </button>

            <div class="mb-6">
                <label class="block text-xs font-bold text-red-400 uppercase mb-1 ml-1">Monto a convertir</label>
                <input type="number" id="amount" 
                       class="w-full p-4 bg-gray-50 border-2 border-red-50 rounded-2xl text-2xl font-semibold focus:border-red-400 focus:outline-none transition text-gray-700" 
                       placeholder="0"
                       oninput="convertir()">
            </div>

            <button onclick="convertir()" class="w-full py-4 bg-red-500 text-white rounded-2xl font-bold text-lg shadow-lg shadow-red-200 hover:bg-red-600 active:scale-95 transition-all">
                Calcular Conversión
            </button>

            <button onclick="limpiar()" class="w-full py-2 mt-3 text-red-300 font-medium hover:text-red-500 transition text-sm">
                Limpiar datos
            </button>

            <div class="mt-8 p-6 bg-red-50 rounded-3xl border border-red-100 text-center">
                <p class="text-xs font-bold text-red-400 uppercase mb-2">Resultado Estimado</p>
                <p id="result" class="text-3xl font-black text-red-600">$ 0</p>
            </div>
        </div>
        
        <div class="p-6 bg-gray-50 text-center border-t border-red-50">
            <p class="text-sm font-bold text-gray-400">Desarrollado por <span class="text-red-500">Fco Gamboa</span></p>
            <p class="text-[10px] text-gray-300 mt-1 uppercase tracking-widest">Fintech Solution v2.0</p>
        </div>
    </div>

    <script>
        let isPesoToUF = true;
        let valorUF = 0;

        // Registro de Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Obtener valor UF desde la API de Mindicador
        async function getTasa() {
            try {
                const response = await fetch('https://mindicador.cl/api/uf');
                const data = await response.json();
                valorUF = data.serie[0].valor;
                document.getElementById('rateInfo').innerText = `Valor UF hoy: $${valorUF.toLocaleString('es-CL')} CLP`;
            } catch (error) {
                document.getElementById('rateInfo').innerText = "Error: Sin conexión a indicadores";
                console.error("Error API:", error);
            }
        }

        function cambiarModo() {
            isPesoToUF = !isPesoToUF;
            document.getElementById('modeText').innerText = isPesoToUF ? "Modo: Pesos a UF" : "Modo: UF a Pesos";
            limpiar();
        }

        function limpiar() {
            document.getElementById('amount').value = "";
            document.getElementById('result').innerText = "$ 0";
            document.getElementById('amount').focus();
        }

        function convertir() {
            const val = parseFloat(document.getElementById('amount').value);
            if (isNaN(val) || valorUF === 0) return;
            
            const res = isPesoToUF ? (val / valorUF) : (val * valorUF);

            // Formateadores específicos para UF y CLP
            // La UF suele usarse con 2 o hasta 4 decimales en contratos.
            const formatterUF = new Intl.NumberFormat('es-CL', {
                style: 'decimal',
                minimumFractionDigits: 2,
                maximumFractionDigits: 4
            });

            const formatterCLP = new Intl.NumberFormat('es-CL', {
                style: 'currency',
                currency: 'CLP',
                minimumFractionDigits: 0
            });

            if (isPesoToUF) {
                document.getElementById('result').innerText = formatterUF.format(res) + " UF";
            } else {
                document.getElementById('result').innerText = formatterCLP.format(res);
            }
        }

        // Inicializar al cargar
        getTasa();
    </script>
</body>
</html>
